<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # moodledata must never be web-accessible (mounted at /var/moodledata)
    <Directory /var/moodledata>
        Require all denied
    </Directory>
</VirtualHost>
